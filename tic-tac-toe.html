<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - Brno Scrum Workshop</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .banner {
      width: 100vw;
      background: #3a3a8a;
      color: #fff;
      text-align: center;
      padding: 2rem 0 1rem 0;
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }
    .game-container {
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 2rem 2.5rem 2.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .cell {
      width: 80px;
      height: 80px;
      background: #fda085;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: #3a3a8a;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      user-select: none;
    }
    .cell:hover {
      background: #f6d365;
    }
    .status {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #3a3a8a;
      min-height: 2.2em;
    }
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .controls button {
      padding: 0.7rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #3a3a8a;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .controls button:hover {
      background: #fda085;
      color: #3a3a8a;
    }
  </style>
</head>
<body>
  <div class="banner">Brno Scrum Workshop</div>
  <div class="game-container">
    <div class="controls">
      <button id="newGameBtn">New game</button>
      <button id="toggleModeBtn">Play vs AI</button>
    </div>
    <div class="status" id="status"></div>
    <div class="board" id="board"></div>
  </div>
  <script>
    const boardElem = document.getElementById('board');
    const statusElem = document.getElementById('status');
    const newGameBtn = document.getElementById('newGameBtn');
    const toggleModeBtn = document.getElementById('toggleModeBtn');

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameActive = true;
    let vsAI = false;

    function renderBoard() {
      boardElem.innerHTML = '';
      board.forEach((cell, idx) => {
        const cellElem = document.createElement('div');
        cellElem.className = 'cell';
        cellElem.textContent = cell ? cell : '';
        cellElem.addEventListener('click', () => handleCellClick(idx));
        boardElem.appendChild(cellElem);
      });
    }

    function handleCellClick(idx) {
      if (!gameActive || board[idx]) return;
      board[idx] = currentPlayer;
      renderBoard();
      if (checkWinner(board, currentPlayer)) {
        statusElem.textContent = `Player ${currentPlayer} wins!`;
        gameActive = false;
        return;
      }
      if (board.every(cell => cell)) {
        statusElem.textContent = "It's a draw!";
        gameActive = false;
        return;
      }
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusElem.textContent = vsAI && currentPlayer === 'O' ? "AI's turn (O)" : `Player ${currentPlayer}'s turn`;
      if (vsAI && currentPlayer === 'O' && gameActive) {
        setTimeout(aiMove, 500);
      }
    }

    function aiMove() {
      // Simple AI: pick random empty cell
      const emptyCells = board.map((cell, idx) => cell ? null : idx).filter(idx => idx !== null);
      if (emptyCells.length === 0) return;
      const move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      handleCellClick(move);
    }

    function checkWinner(b, player) {
      const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8], // rows
        [0,3,6],[1,4,7],[2,5,8], // cols
        [0,4,8],[2,4,6]          // diags
      ];
      return winPatterns.some(pattern => pattern.every(idx => b[idx] === player));
    }

    function newGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameActive = true;
      statusElem.textContent = vsAI ? "Player X's turn" : "Player X's turn";
      renderBoard();
    }

    newGameBtn.addEventListener('click', newGame);
    toggleModeBtn.addEventListener('click', () => {
      vsAI = !vsAI;
      toggleModeBtn.textContent = vsAI ? 'Play 2 Players' : 'Play vs AI';
      newGame();
    });

    // Initial render
    newGame();
  </script>
</body>
</html>
