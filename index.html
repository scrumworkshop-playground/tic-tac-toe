<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="banner">Brno Scrum Workshop</h1>
            <h2>Tic-Tac-Toe Game</h2>
        </header>
        
        <div class="game-controls">
            <div class="game-mode">
                <label>
                    <input type="radio" name="gameMode" value="human" checked>
                    Play vs Human
                </label>
                <label>
                    <input type="radio" name="gameMode" value="ai">
                    Play vs AI
                </label>
            </div>
            <button id="newGameBtn" class="new-game-btn">New Game</button>
        </div>
        
        <div class="game-info">
            <div id="currentPlayer" class="current-player">Current Player: X</div>
            <div id="gameStatus" class="game-status"></div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <div class="score-board">
            <div class="score">
                <span>Player X: </span>
                <span id="scoreX">0</span>
            </div>
            <div class="score">
                <span>Player O: </span>
                <span id="scoreO">0</span>
            </div>
            <div class="score">
                <span>Draws: </span>
                <span id="scoreDraw">0</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
